name: Build & Push Docker Image to GHCR

on:
  push:
    branches:
      - main
      - dev
      - release/*
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # main 分支 → latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # dev 分支 → dev-{SHA}
            type=raw,value=dev-${{ github.sha }},enable=${{ github.ref == 'refs/heads/dev' }}
            # release/* 分支 → release-{branch}-{SHA}
            type=raw,value=release-${{ github.ref_name }}-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/release/') }}
            # Tag push (vX.Y.Z) → vX.Y.Z
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # 所有情況都會多打一個 SHA tag
            type=sha

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
