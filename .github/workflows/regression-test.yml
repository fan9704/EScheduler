name: Backend - Regression Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "dev"]

jobs:
  test-backend-unit:
    name: Run FastAPI Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run backend tests
        env:
          PYTHONPATH: ./src
        run: |
          uv run pytest tests/unit -v --maxfail=1 --disable-warnings --cov=src --cov-report=term-missing
