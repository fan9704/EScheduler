global:
  scrape_interval:     15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
    - targets: ['backend-prometheus:9090']
  - job_name: 'fastapi'
    static_configs:
    - targets: ["backend:8000"]
  - job_name: 'tempo'
    static_configs:
      - targets: [ 'backend-tempo:3200' ]