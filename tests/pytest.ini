[pytest]
# 測試環境變數檔案
env_files =
    .env.test
# 測試檔案的命名規則
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 指定只搜尋單元測試資料夾
testpaths =
    tests/unit

# 顯示更友善的輸出
addopts =
    -v
    --tb=short
    --disable-warnings
    --maxfail=3

# 忽略一些非單元測試資料夾（例如 integration / e2e）
norecursedirs =
    tests/integration
    tests/e2e
    node_modules
    .venv
    .git
