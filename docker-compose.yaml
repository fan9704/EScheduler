services:
  app:
    build: .
    image: "fan9704/backend"
    container_name: "backend"
    ports:
      - "0.0.0.0:8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - prometheus
      - loki
    networks:
      - app_net
  postgres:
    image: "postgres:13"
    container_name: "backend-postgresql"
    ports:
      - "5432:5432"
    env_file: .env
    networks:
      - app_net
    volumes:
      - "./postgres-data:/var/lib/postgresql/data"
    restart: always
  pgadmin:
    image: "dpage/pgadmin4:latest"
    container_name: backend-pgAdmin
    env_file: .env
    ports:
      - "9101:80"
    links:
      - "postgres:pgadmin"
    networks:
      - app_net
    volumes:
     - "./pgadmin_data:/var/lib/pgadmin"
    restart: always
  prometheus:
    image: prom/prometheus
    container_name: backend-prometheus
    hostname: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitor
  alertmanager:
    image: prom/alertmanager
    container_name: backend-alertmanager
    hostname: alertmanager
    restart: always
    ports:
      - "9093:9093"
    networks:
      - monitor

  grafana:
    image: grafana/grafana
    container_name: backend-grafana
    hostname: grafana
    ports:
      - "3001:3000"
    networks:
      - monitor
    volumes:
      - ./grafana_data/data:/var/lib/grafana
      - ./grafana_data/provisioning:/etc/grafana/provisioning

  loki:
    image: grafana/loki:latest
    container_name: backend-loki
    ports:
      - "3100:3100"
    networks:
      - monitor

networks:
    monitor:
        driver: bridge
    app_net:
        driver: bridge